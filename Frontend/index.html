<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
  <header class="app-header">
    <h1>📚 Library Management System</h1>
  </header>

  <!-- DASHBOARD -->
  <div class="stats">
    <div class="stat shadow-sm">
      <div class="stat-title">Total Books</div>
      <div class="stat-value" id="totalBooks">0</div>
    </div>
    <div class="stat shadow-sm">
      <div class="stat-title">Issued Books</div>
      <div class="stat-value" id="issuedBooks">0</div>
    </div>
    <div class="stat shadow-sm">
      <div class="stat-title">Overdue Books</div>
      <div class="stat-value text-error" id="overdueBooks">0</div>
    </div>
    <div class="stat shadow-sm">
      <div class="stat-title">Member Count</div>
      <div class="stat-value text-success" id="memberCount">0</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- ADD BOOK -->
    <div class="card shadow">
      <h2>Add New Book</h2>
      <div class="form-group">
        <input id="name" placeholder="Book Name">
        <input id="author" placeholder="Author">
        <input id="qty" type="number" placeholder="Quantity" min="0">
        <button class="btn-primary" onclick="addBook()">Add Book</button>
      </div>
    </div>

    <!-- SEARCH & TABLE CONTAINER -->
    <div class="card shadow list-card">
      <div class="list-header">
        <h2>Books List</h2>
        <div class="search-bar">
          <input id="searchInput" placeholder="🔍 Search book by name or author..." onkeyup="searchBook(this.value)">
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Author</th>
              <th>Qty</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="bookTable">
            <!-- Books will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
